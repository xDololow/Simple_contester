services:
  mariadb:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-simple_contester}
      MARIADB_USER: ${MARIADB_USER:-contestant}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-contestant}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root}
    ports:
      - "${MARIADB_PORT:-3307}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql+pymysql://contestant:contestant@mariadb:3306/simple_contester}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8001}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bun --eval \"await fetch('http://127.0.0.1:5173').then((response) => { if (!response.ok) process.exit(1) })\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  judger:
    build: ./judger
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql+pymysql://contestant:contestant@mariadb:3306/simple_contester}
      JUDGER_ID: ${JUDGER_ID:-docker-judger}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-1}
      STOP_ON_FIRST_FAILED_TEST: ${STOP_ON_FIRST_FAILED_TEST:-1}
    depends_on:
      mariadb:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os; from sqlalchemy import create_engine, text; engine = create_engine(os.environ['DATABASE_URL'], pool_pre_ping=True); conn = engine.connect(); conn.execute(text('SELECT 1')); conn.close()\""]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  mariadb_data:
