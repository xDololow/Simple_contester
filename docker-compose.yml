services:
  mariadb:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-simple_contester}
      MARIADB_USER: ${MARIADB_USER:-contestant}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-contestant}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root}
    ports:
      - "${MARIADB_PORT:-3307}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql+pymysql://contestant:contestant@mariadb:3306/simple_contester}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      ACCESS_TOKEN_MINUTES: ${ACCESS_TOKEN_MINUTES:-1440}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      LOGIN_RATE_LIMIT_ENABLED: ${LOGIN_RATE_LIMIT_ENABLED:-true}
      LOGIN_RATE_LIMIT_ATTEMPTS: ${LOGIN_RATE_LIMIT_ATTEMPTS:-8}
      LOGIN_RATE_LIMIT_WINDOW_SECONDS: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS:-60}
      LOGIN_RATE_LIMIT_LOCKOUT_SECONDS: ${LOGIN_RATE_LIMIT_LOCKOUT_SECONDS:-300}
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8001}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bun --eval \"await fetch('http://127.0.0.1:5173').then((response) => { if (!response.ok) process.exit(1) })\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  judger:
    image: simple-contester-judger:local
    build: ./judger
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql+pymysql://contestant:contestant@mariadb:3306/simple_contester}
      JUDGER_ID: ${JUDGER_ID:-docker-judger}
      JUDGER_VERSION: ${JUDGER_VERSION:-local}
      JUDGER_SANDBOX_MODE: ${JUDGER_SANDBOX_MODE:-subprocess}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-1}
      JUDGER_HEARTBEAT_INTERVAL_SECONDS: ${JUDGER_HEARTBEAT_INTERVAL_SECONDS:-5}
      SUBMISSION_LEASE_SECONDS: ${SUBMISSION_LEASE_SECONDS:-60}
      SUBMISSION_MAX_ATTEMPTS: ${SUBMISSION_MAX_ATTEMPTS:-3}
      STOP_ON_FIRST_FAILED_TEST: ${STOP_ON_FIRST_FAILED_TEST:-1}
      OUTPUT_LIMIT_BYTES: ${OUTPUT_LIMIT_BYTES:-1048576}
      PROCESS_LIMIT: ${PROCESS_LIMIT:-256}
      FILE_SIZE_LIMIT_BYTES: ${FILE_SIZE_LIMIT_BYTES:-16777216}
      COMPILE_TIMEOUT_SECONDS: ${COMPILE_TIMEOUT_SECONDS:-20}
      COMPILE_MEMORY_LIMIT_MB: ${COMPILE_MEMORY_LIMIT_MB:-4096}
      COMPILE_PROCESS_LIMIT: ${COMPILE_PROCESS_LIMIT:-256}
      COMPILE_FILE_SIZE_LIMIT_BYTES: ${COMPILE_FILE_SIZE_LIMIT_BYTES:-268435456}
    read_only: true
    tmpfs:
      - /tmp:rw,exec,nosuid,nodev,size=512m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    depends_on:
      mariadb:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os; from sqlalchemy import create_engine, text; engine = create_engine(os.environ['DATABASE_URL'], pool_pre_ping=True); conn = engine.connect(); conn.execute(text('SELECT 1')); conn.close()\""]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 10s

  judger-docker-sandbox:
    profiles:
      - docker-sandbox
    image: simple-contester-judger:local
    build: ./judger
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql+pymysql://contestant:contestant@mariadb:3306/simple_contester}
      JUDGER_ID: ${JUDGER_ID:-docker-judger-hard}
      JUDGER_VERSION: ${JUDGER_VERSION:-local}
      JUDGER_SANDBOX_MODE: docker
      JUDGER_WORK_ROOT: /tmp/simple-contester-judger-work
      JUDGER_DOCKER_IMAGE: ${JUDGER_DOCKER_IMAGE:-simple-contester-judger:local}
      JUDGER_DOCKER_USER: ${JUDGER_DOCKER_USER:-judge}
      JUDGER_DOCKER_CPUS: ${JUDGER_DOCKER_CPUS:-1}
      JUDGER_DOCKER_TMPFS_SIZE: ${JUDGER_DOCKER_TMPFS_SIZE:-512m}
      DOCKER_CONFIG: /tmp/.docker
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-1}
      JUDGER_HEARTBEAT_INTERVAL_SECONDS: ${JUDGER_HEARTBEAT_INTERVAL_SECONDS:-5}
      SUBMISSION_LEASE_SECONDS: ${SUBMISSION_LEASE_SECONDS:-60}
      SUBMISSION_MAX_ATTEMPTS: ${SUBMISSION_MAX_ATTEMPTS:-3}
      STOP_ON_FIRST_FAILED_TEST: ${STOP_ON_FIRST_FAILED_TEST:-1}
      OUTPUT_LIMIT_BYTES: ${OUTPUT_LIMIT_BYTES:-1048576}
      PROCESS_LIMIT: ${PROCESS_LIMIT:-256}
      FILE_SIZE_LIMIT_BYTES: ${FILE_SIZE_LIMIT_BYTES:-16777216}
      COMPILE_TIMEOUT_SECONDS: ${COMPILE_TIMEOUT_SECONDS:-20}
      COMPILE_MEMORY_LIMIT_MB: ${COMPILE_MEMORY_LIMIT_MB:-4096}
      COMPILE_PROCESS_LIMIT: ${COMPILE_PROCESS_LIMIT:-256}
      COMPILE_FILE_SIZE_LIMIT_BYTES: ${COMPILE_FILE_SIZE_LIMIT_BYTES:-268435456}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/simple-contester-judger-work:/tmp/simple-contester-judger-work
    group_add:
      - ${DOCKER_SOCK_GID:-0}
    read_only: true
    tmpfs:
      - /tmp:rw,exec,nosuid,nodev,size=512m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    depends_on:
      mariadb:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os; from sqlalchemy import create_engine, text; engine = create_engine(os.environ['DATABASE_URL'], pool_pre_ping=True); conn = engine.connect(); conn.execute(text('SELECT 1')); conn.close()\""]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  mariadb_data:
